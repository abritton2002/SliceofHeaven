<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Request Dashboard - Slice of Heaven</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/main-logo.PNG">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+NSW:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <main class="admin-shell">
        <header class="admin-header">
            <div>
                <p class="admin-kicker">Private</p>
                <h1>Request Dashboard</h1>
                <p>Manage quote and order requests from the connected Google Sheet.</p>
            </div>
            <div class="admin-actions">
                <button type="button" class="admin-secondary-btn" id="refreshBtn">Refresh</button>
                <button type="button" class="admin-secondary-btn" id="forgetKeyBtn">Forget Key</button>
            </div>
        </header>

        <section class="admin-auth" id="authPanel">
            <h2>Admin Access</h2>
            <p>Enter the dashboard key. A secret link can also include <code>?key=...</code>.</p>
            <form id="authForm" class="admin-auth-form">
                <input type="password" id="adminKeyInput" placeholder="Admin key" autocomplete="current-password" required>
                <button type="submit" class="admin-primary-btn">Open Dashboard</button>
            </form>
            <p class="admin-error" id="authError" hidden></p>
        </section>

        <section class="admin-dashboard" id="dashboard" hidden>
            <div class="admin-stats" id="stats"></div>

            <div class="admin-toolbar">
                <div class="admin-search">
                    <input type="search" id="searchInput" placeholder="Search name, phone, occasion, colors...">
                </div>
                <select id="statusFilter">
                    <option value="all">All statuses</option>
                    <option value="New">New</option>
                    <option value="New Quote">New Quote</option>
                    <option value="New Order">New Order</option>
                    <option value="Quoted">Quoted</option>
                    <option value="Booked">Booked</option>
                    <option value="Completed">Completed</option>
                    <option value="Backed Out">Backed Out</option>
                </select>
                <select id="typeFilter">
                    <option value="all">Quotes and orders</option>
                    <option value="Quote Request">Quote requests</option>
                    <option value="Order Request">Order requests</option>
                </select>
                <div class="admin-view-toggle" aria-label="Dashboard view">
                    <button type="button" class="active" data-view="list">List</button>
                    <button type="button" data-view="calendar">Calendar</button>
                </div>
            </div>

            <div class="admin-list" id="listView"></div>

            <div class="admin-calendar-view" id="calendarView" hidden>
                <div class="admin-calendar-header">
                    <button type="button" class="admin-secondary-btn" id="prevMonthBtn">Previous</button>
                    <h2 id="calendarTitle"></h2>
                    <div class="admin-calendar-actions">
                        <button type="button" class="admin-secondary-btn" id="todayBtn">Today</button>
                        <button type="button" class="admin-secondary-btn" id="nextMonthBtn">Next</button>
                    </div>
                </div>
                <div class="admin-calendar-grid" id="calendarGrid"></div>
            </div>
        </section>
    </main>

    <div class="admin-quote-modal" id="quoteModal" hidden>
        <div class="admin-quote-panel" role="dialog" aria-modal="true" aria-labelledby="quoteModalTitle">
            <section class="admin-quote-editor">
                <div class="admin-quote-editor-header">
                    <div>
                        <p class="admin-kicker">Quote Builder</p>
                        <h2 id="quoteModalTitle">Custom Quote</h2>
                    </div>
                    <button type="button" class="admin-secondary-btn" id="closeQuoteBtn">Close</button>
                </div>

                <form id="quoteForm" class="admin-quote-form">
                    <label>For<input type="text" name="customerName" autocomplete="off"></label>
                    <label>Quote title<input type="text" name="cakeTitle" autocomplete="off"></label>
                    <label>Cake details line<input type="text" name="cakeDetails" autocomplete="off"></label>
                    <label>Flavor line<textarea name="flavorLine" rows="2"></textarea></label>
                    <label>Quote total<input type="number" name="quoteTotal" min="0" step="1" inputmode="decimal"></label>
                    <label>Booking deposit<input type="number" name="deposit" min="0" step="1" inputmode="decimal"></label>
                    <label class="admin-quote-wide">Includes line<textarea name="includesLine" rows="3"></textarea></label>
                    <label>Pick-up date<input type="text" name="pickupDate" autocomplete="off"></label>
                    <label>Thank-you name<input type="text" name="thankYouName" autocomplete="off"></label>
                    <label>Apple Cash<input type="text" name="appleCash" autocomplete="off"></label>
                    <label>Venmo<input type="text" name="venmo" autocomplete="off"></label>
                    <label>Zelle<input type="text" name="zelle" autocomplete="off"></label>
                </form>

                <div class="admin-quote-actions">
                    <button type="button" class="admin-secondary-btn" id="downloadPdfBtn">Download PDF</button>
                    <button type="button" class="admin-secondary-btn" id="downloadPngBtn">Download PNG</button>
                    <button type="button" class="admin-primary-btn" id="saveQuoteBtn">Save Total</button>
                </div>
            </section>

            <section class="admin-quote-preview" aria-label="Generated quote preview">
                <div class="quote-sheet" id="quoteSheet"></div>
            </section>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJgHWxhgSIaLeP0xLaTwBRww5A2lCeH-D9zcyQJiUp3KkxzNk5St9jaonRLUWG7BHS/exec';
        const STATUSES = ['New', 'New Quote', 'New Order', 'Quoted', 'Booked', 'Completed', 'Backed Out'];
        const STORAGE_KEY = 'sliceAdminKey';
        const PAYMENT_DEFAULTS = {
            appleCash: '407-417-1226',
            venmo: '@IverryOrtiz',
            zelle: 'sliceofheaven'
        };

        let adminKey = '';
        let requests = [];
        let activeView = 'list';
        let calendarMonth = new Date();
        let activeQuoteRequest = null;

        const authPanel = document.getElementById('authPanel');
        const dashboard = document.getElementById('dashboard');
        const authForm = document.getElementById('authForm');
        const authError = document.getElementById('authError');
        const adminKeyInput = document.getElementById('adminKeyInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const forgetKeyBtn = document.getElementById('forgetKeyBtn');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const typeFilter = document.getElementById('typeFilter');
        const statsEl = document.getElementById('stats');
        const listView = document.getElementById('listView');
        const calendarView = document.getElementById('calendarView');
        const calendarGrid = document.getElementById('calendarGrid');
        const calendarTitle = document.getElementById('calendarTitle');
        const quoteModal = document.getElementById('quoteModal');
        const quoteForm = document.getElementById('quoteForm');
        const quoteSheet = document.getElementById('quoteSheet');
        const closeQuoteBtn = document.getElementById('closeQuoteBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const downloadPngBtn = document.getElementById('downloadPngBtn');
        const saveQuoteBtn = document.getElementById('saveQuoteBtn');
        let quoteLogoDataUrl = '';

        function getInitialKey() {
            const params = new URLSearchParams(window.location.search);
            const keyFromUrl = params.get('key');

            if (keyFromUrl) {
                params.delete('key');
                const query = params.toString();
                const cleanUrl = `${window.location.pathname}${query ? `?${query}` : ''}${window.location.hash}`;
                window.history.replaceState({}, document.title, cleanUrl);
                return keyFromUrl;
            }

            return sessionStorage.getItem(STORAGE_KEY) || '';
        }

        function setBusy(isBusy) {
            refreshBtn.disabled = isBusy;
            document.querySelectorAll('.admin-primary-btn, .admin-secondary-btn').forEach(button => {
                if (button.id !== 'forgetKeyBtn') button.disabled = isBusy;
            });
        }

        async function apiRequest(action, payload = {}) {
            const params = new URLSearchParams({ action, key: adminKey, ...payload });
            const options = action === 'adminList'
                ? {}
                : {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                };

            const url = action === 'adminList'
                ? `${APPS_SCRIPT_URL}?${params.toString()}`
                : APPS_SCRIPT_URL;

            const response = await fetch(url, options);
            const responseText = await response.text();
            let result;

            try {
                result = JSON.parse(responseText);
            } catch (error) {
                throw new Error(responseText.trim().startsWith('<')
                    ? 'The dashboard API returned an HTML page instead of data. Refresh once, then check that the Apps Script deployment is accessible to anyone.'
                    : 'The dashboard API returned an unreadable response.');
            }

            if (result.status !== 'success') {
                throw new Error(result.message || 'Request failed.');
            }

            return result;
        }

        async function loadRequests() {
            setBusy(true);
            authError.hidden = true;

            try {
                const result = await apiRequest('adminList');
                requests = (result.requests || []).sort((a, b) => {
                    return (Number(b.timestampSort || 0) - Number(a.timestampSort || 0)) ||
                        (Number(b.rowNumber || 0) - Number(a.rowNumber || 0));
                });
                authPanel.hidden = true;
                dashboard.hidden = false;
                sessionStorage.setItem(STORAGE_KEY, adminKey);
                setCalendarToNextRequest(requests);
                render();
            } catch (error) {
                dashboard.hidden = true;
                authPanel.hidden = false;
                authError.textContent = error.message;
                authError.hidden = false;
            } finally {
                setBusy(false);
            }
        }

        function getFilteredRequests() {
            const term = searchInput.value.trim().toLowerCase();
            const status = statusFilter.value;
            const type = typeFilter.value;

            return requests.filter(request => {
                const matchesStatus = status === 'all' || normalizeStatus(request.status) === status;
                const matchesType = type === 'all' || request.requestType === type;
                const searchable = [
                    request.name,
                    request.phone,
                    request.email,
                    request.occasion,
                    request.colors,
                    request.message,
                    request.eventDate,
                    request.statusNote
                ].join(' ').toLowerCase();

                return matchesStatus && matchesType && (!term || searchable.includes(term));
            });
        }

        function parseIsoDate(isoDate) {
            if (!isoDate) return null;
            const parts = isoDate.split('-').map(Number);
            if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function normalizeStatus(status) {
            return String(status || 'New').trim();
        }

        function pickupTimeSortValue(value) {
            const text = String(value || '').trim();
            const match = text.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?$/i);
            if (!match) return Number.MAX_SAFE_INTEGER;

            let hour = Number(match[1]);
            const minute = Number(match[2] || 0);
            const period = match[3] ? match[3].toUpperCase() : '';

            if (period === 'PM' && hour !== 12) hour += 12;
            if (period === 'AM' && hour === 12) hour = 0;

            return (hour * 60) + minute;
        }

        function formatEventDate(request) {
            const date = parseIsoDate(request.eventDateIso);
            if (!date) return request.eventDate || 'No date';

            return date.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function formatQuoteDate(request) {
            const date = parseIsoDate(request.eventDateIso);
            if (!date) return request.eventDate || '';

            return date.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function statusClass(status) {
            return String(status || 'New').replace(/\s+/g, '-').toLowerCase();
        }

        function compactCakeLine(request) {
            return [
                request.size,
                request.layers ? `${request.layers} layers` : '',
                request.shape,
                request.servings ? `${request.servings} servings` : ''
            ].filter(Boolean).join(' · ') || 'Cake details pending';
        }

        function setCalendarToNextRequest(sourceRequests = requests) {
            const datedRequests = sourceRequests
                .map(request => parseIsoDate(request.eventDateIso))
                .filter(Boolean)
                .sort((a, b) => a - b);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const nextDate = datedRequests.find(date => date >= today) || datedRequests[datedRequests.length - 1];

            if (nextDate) {
                calendarMonth = new Date(nextDate.getFullYear(), nextDate.getMonth(), 1);
            }
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, character => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[character]));
        }

        function preserveLineBreaks(value) {
            return escapeHtml(value).replace(/\n/g, '<br>');
        }

        function parseMoneyValue(value) {
            const amount = Number(String(value || '').replace(/[^0-9.]/g, ''));
            return Number.isFinite(amount) && amount > 0 ? amount : '';
        }

        function moneyDisplay(value) {
            const amount = parseMoneyValue(value);
            if (!amount) return '$0';
            return `$${amount % 1 === 0 ? amount.toFixed(0) : amount.toFixed(2)}`;
        }

        function defaultCakeTitle(request) {
            if (request.colors) return `${request.colors} Cake`;
            if (request.occasion) return `${request.occasion} Cake`;
            return 'Custom Cake';
        }

        function defaultCakeDetails(request) {
            const layers = request.layers ? `${request.layers} Layers` : 'Custom Layers';
            const sizeShape = [request.size, request.shape].filter(Boolean).join(' - ');
            return sizeShape ? `${layers} (${sizeShape})` : layers;
        }

        function defaultIncludesLine(request) {
            const pieces = [];
            if (request.colors) pieces.push(`${request.colors} vintage piping`);
            if (request.extras) pieces.push(request.extras);
            if (request.message) pieces.push(`message: "${request.message}"`);
            return pieces.length
                ? `Includes ${pieces.join(', ')}`
                : 'Includes custom vintage piping and decorations as discussed';
        }

        function renderStats(filtered) {
            const counts = {
                total: filtered.length,
                quotes: filtered.filter(item => item.requestType === 'Quote Request').length,
                orders: filtered.filter(item => item.requestType === 'Order Request').length,
                open: filtered.filter(item => !['Completed', 'Backed Out'].includes(normalizeStatus(item.status))).length
            };

            statsEl.innerHTML = `
                <div><strong>${counts.total}</strong><span>Total</span></div>
                <div><strong>${counts.open}</strong><span>Open</span></div>
                <div><strong>${counts.quotes}</strong><span>Quotes</span></div>
                <div><strong>${counts.orders}</strong><span>Orders</span></div>
            `;
        }

        function requestCard(request) {
            const status = normalizeStatus(request.status);
            const currentStatusClass = statusClass(status);
            const statusOptions = STATUSES.map(status => (
                `<option value="${escapeHtml(status)}" ${normalizeStatus(request.status) === status ? 'selected' : ''}>${escapeHtml(status)}</option>`
            )).join('');

            return `
                <article class="admin-request-card status-row-${escapeHtml(currentStatusClass)}" data-row="${request.rowNumber}">
                    <div class="admin-request-row">
                        <div class="admin-row-main">
                            <div class="admin-row-title">
                                <span class="admin-pill status-${escapeHtml(currentStatusClass)}">${escapeHtml(status)}</span>
                                <strong>${escapeHtml(request.name || 'Unnamed request')}</strong>
                                <span>${escapeHtml(request.requestType || 'Request')}</span>
                            </div>
                            <div class="admin-row-meta">
                                <span>${escapeHtml(formatEventDate(request))}</span>
                                <span>${escapeHtml(request.pickupTime || 'Time TBD')}</span>
                                <span>${escapeHtml(request.occasion || 'No occasion')}</span>
                                <span>${escapeHtml(compactCakeLine(request))}</span>
                            </div>
                        </div>

                        <div class="admin-row-contact">
                            ${request.phone ? `<a href="tel:${escapeHtml(request.phone)}">${escapeHtml(request.phone)}</a>` : '<span>-</span>'}
                            ${request.email ? `<a href="mailto:${escapeHtml(request.email)}">${escapeHtml(request.email)}</a>` : ''}
                        </div>

                        <form class="admin-status-form">
                            <select name="status" aria-label="Status">${statusOptions}</select>
                            <input type="text" name="quotedPrice" placeholder="Quoted price" value="${escapeHtml(request.quotedPrice || '')}">
                            <input type="text" name="note" placeholder="Note" value="${escapeHtml(request.statusNote || '')}">
                            <button type="submit" class="admin-primary-btn">Save</button>
                            <button type="button" class="admin-secondary-btn admin-quote-btn" data-row="${request.rowNumber}">Quote</button>
                        </form>
                    </div>

                    <details class="admin-request-details">
                        <summary>View full request</summary>
                        <dl>
                            <div><dt>Submitted</dt><dd>${escapeHtml(request.timestamp || '-')}</dd></div>
                            <div><dt>Cake</dt><dd>${escapeHtml(request.size || '-')}, ${escapeHtml(request.layers || '-')} layers, ${escapeHtml(request.shape || '-')}</dd></div>
                            <div><dt>Servings</dt><dd>${escapeHtml(request.servings || '-')}</dd></div>
                            <div><dt>Delivery</dt><dd>${escapeHtml(request.delivery || '-')}</dd></div>
                            <div><dt>Colors</dt><dd>${escapeHtml(request.colors || '-')}</dd></div>
                            <div><dt>Flavors</dt><dd>${escapeHtml(request.flavors || '-')}</dd></div>
                            <div><dt>Extras</dt><dd>${escapeHtml(request.extras || '-')}</dd></div>
                            <div><dt>Message</dt><dd>${escapeHtml(request.message || '-')}</dd></div>
                            <div><dt>Allergies</dt><dd>${escapeHtml(request.allergies || '-')}</dd></div>
                            <div><dt>Status updated</dt><dd>${escapeHtml(request.statusUpdated || '-')}</dd></div>
                        </dl>
                    </details>
                </article>
            `;
        }

        function renderList(filtered) {
            listView.innerHTML = filtered.length
                ? filtered.map(requestCard).join('')
                : '<p class="admin-empty">No requests match these filters.</p>';
        }

        function renderCalendar(filtered) {
            const year = calendarMonth.getFullYear();
            const month = calendarMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startOffset = firstDay.getDay();
            const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;

            calendarTitle.textContent = calendarMonth.toLocaleDateString('en-US', {
                month: 'long',
                year: 'numeric'
            });

            const calendarRequests = filtered.filter(request => request.eventDateIso);
            const byDate = calendarRequests.reduce((acc, request) => {
                if (!request.eventDateIso) return acc;
                acc[request.eventDateIso] = acc[request.eventDateIso] || [];
                acc[request.eventDateIso].push(request);
                return acc;
            }, {});

            let html = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
                .map(day => `<div class="admin-calendar-weekday">${day}</div>`)
                .join('');

            for (let index = 0; index < totalCells; index++) {
                const dayNumber = index - startOffset + 1;
                const inMonth = dayNumber >= 1 && dayNumber <= lastDay.getDate();
                const date = inMonth ? new Date(year, month, dayNumber) : null;
                const iso = date
                    ? `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`
                    : '';
                const dayRequests = (byDate[iso] || []).sort((a, b) => pickupTimeSortValue(a.pickupTime) - pickupTimeSortValue(b.pickupTime));

                html += `
                    <div class="admin-calendar-day ${inMonth ? '' : 'muted'} ${dayRequests.length ? 'has-items' : ''}">
                        <div class="admin-calendar-date-line">
                            <span>${inMonth ? dayNumber : ''}</span>
                            ${dayRequests.length ? `<strong>${dayRequests.length}</strong>` : ''}
                        </div>
                        ${dayRequests.map(request => `
                            <button type="button" data-row="${request.rowNumber}" class="status-${escapeHtml(statusClass(request.status))}">
                                <span>${escapeHtml(request.pickupTime || 'TBD')}</span>
                                ${escapeHtml(request.name || 'Request')}
                                <small>${escapeHtml(normalizeStatus(request.status))} · ${escapeHtml(request.requestType || '')}</small>
                            </button>
                        `).join('')}
                    </div>
                `;
            }

            calendarGrid.innerHTML = html;
        }

        function render() {
            const filtered = getFilteredRequests();
            renderStats(filtered);
            renderList(filtered);
            renderCalendar(filtered);
            listView.hidden = activeView !== 'list';
            calendarView.hidden = activeView !== 'calendar';
        }

        function fillQuoteForm(request) {
            const total = parseMoneyValue(request.quotedPrice);
            const deposit = total ? Math.ceil(total / 2) : '';

            quoteForm.elements.customerName.value = request.name || '';
            quoteForm.elements.cakeTitle.value = defaultCakeTitle(request);
            quoteForm.elements.cakeDetails.value = defaultCakeDetails(request);
            quoteForm.elements.flavorLine.value = request.flavors ? `Flavor: ${request.flavors}` : 'Flavor:';
            quoteForm.elements.quoteTotal.value = total;
            quoteForm.elements.deposit.value = deposit;
            quoteForm.elements.includesLine.value = defaultIncludesLine(request);
            quoteForm.elements.pickupDate.value = formatQuoteDate(request);
            quoteForm.elements.thankYouName.value = request.name || '';
            quoteForm.elements.appleCash.value = PAYMENT_DEFAULTS.appleCash;
            quoteForm.elements.venmo.value = PAYMENT_DEFAULTS.venmo;
            quoteForm.elements.zelle.value = PAYMENT_DEFAULTS.zelle;
        }

        function updateQuotePreview() {
            const values = Object.fromEntries(new FormData(quoteForm).entries());

            quoteSheet.innerHTML = `
                <div class="quote-page">
                    <h1>Custom Quote</h1>
                    <div class="quote-border">
                        <div class="quote-content">
                            <div class="quote-recipient">
                                <h2>For: ${escapeHtml(values.customerName || 'Customer')}</h2>
                                <p>${escapeHtml(values.cakeTitle || 'Custom Cake')}</p>
                            </div>

                            <div class="quote-section">
                                <h3>Cake Details:</h3>
                                <p>${escapeHtml(values.cakeDetails || 'Custom cake')}</p>
                                <p>${preserveLineBreaks(values.flavorLine || 'Flavor:')}</p>
                            </div>

                            <div class="quote-section quote-money">
                                <p>Quote Total: <span>${moneyDisplay(values.quoteTotal)}</span></p>
                                <p class="quote-includes">*${preserveLineBreaks(values.includesLine || 'Includes custom details as discussed')}*</p>
                            </div>

                            <div class="quote-section quote-money">
                                <p>Booking Deposit: <span>${moneyDisplay(values.deposit)}</span></p>
                                <p>(non-refundable &amp; required to secure your order)</p>
                            </div>

                            <div class="quote-section quote-payment">
                                <h3>Payment Options:</h3>
                                <p>Apple Cash: <span>${escapeHtml(values.appleCash || PAYMENT_DEFAULTS.appleCash)}</span></p>
                                <p>Venmo: ${escapeHtml(values.venmo || PAYMENT_DEFAULTS.venmo)}</p>
                                <p>Zelle: ${escapeHtml(values.zelle || PAYMENT_DEFAULTS.zelle)}</p>
                                <p>(If doing this option, please <span>DO NOT</span> tag as a good or service<br>as they take a %)</p>
                            </div>

                            <div class="quote-section">
                                <p>Final Payment Due: Upon Pick-Up.</p>
                            </div>

                            <div class="quote-section quote-pickup">
                                <h3>Pick-Up Date:</h3>
                                <p>${escapeHtml(values.pickupDate || 'TBD')}</p>
                            </div>

                            <p class="quote-thanks">Thank you, ${escapeHtml(values.thankYouName || values.customerName || 'Customer')}!</p>
                        </div>
                        <div class="quote-logo">
                            <img src="images/word2-logo.PNG" alt="Slice of Heaven Cakes">
                        </div>
                    </div>
                </div>
            `;
        }

        function openQuoteModal(rowNumber) {
            const request = requests.find(item => String(item.rowNumber) === String(rowNumber));
            if (!request) return;

            activeQuoteRequest = request;
            fillQuoteForm(request);
            updateQuotePreview();
            quoteModal.hidden = false;
            document.body.classList.add('quote-modal-open');
            quoteForm.elements.quoteTotal.focus();
        }

        function closeQuoteModal() {
            quoteModal.hidden = true;
            document.body.classList.remove('quote-modal-open');
            activeQuoteRequest = null;
        }

        function fileSafeName(value) {
            return String(value || 'Customer')
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-') || 'Customer';
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        function svgEscape(value) {
            return String(value || '').replace(/[&<>"']/g, character => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&apos;'
            }[character]));
        }

        function wrapQuoteText(value, maxCharacters) {
            return String(value || '')
                .split(/\n+/)
                .flatMap(line => {
                    const words = line.trim().split(/\s+/).filter(Boolean);
                    const lines = [];
                    let current = '';

                    words.forEach(word => {
                        const next = current ? `${current} ${word}` : word;
                        if (next.length > maxCharacters && current) {
                            lines.push(current);
                            current = word;
                        } else {
                            current = next;
                        }
                    });

                    if (current) lines.push(current);
                    return lines.length ? lines : [''];
                });
        }

        function svgTextLines(lines, x, y, size, lineHeight, attributes = '') {
            return lines.map((line, index) => (
                `<text x="${x}" y="${y + (index * lineHeight)}" font-size="${size}" ${attributes}>${svgEscape(line)}</text>`
            )).join('');
        }

        async function getQuoteLogoDataUrl() {
            if (quoteLogoDataUrl) return quoteLogoDataUrl;

            const response = await fetch('images/word2-logo.PNG');
            const blob = await response.blob();
            quoteLogoDataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
            return quoteLogoDataUrl;
        }

        function getQuoteValues() {
            return Object.fromEntries(new FormData(quoteForm).entries());
        }

        async function buildQuoteSvg() {
            const values = getQuoteValues();
            const logoDataUrl = await getQuoteLogoDataUrl();
            const flavorLines = wrapQuoteText(values.flavorLine || 'Flavor:', 58);
            const includesLines = wrapQuoteText(`*${values.includesLine || 'Includes custom details as discussed'}*`, 58);
            const paymentNoteLines = [
                '(If doing this option, please DO NOT tag as a good or service',
                'as they take a %)'
            ];

            return `
                <svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1294" viewBox="0 0 1000 1294">
                    <rect width="1000" height="1294" fill="#e7f7fd"/>
                    <text x="500" y="92" text-anchor="middle" fill="#223746" font-family="'Playwrite AU NSW', cursive" font-size="58" font-weight="400">Custom Quote</text>
                    <rect x="80" y="125" width="840" height="1100" rx="48" fill="#fffef9" stroke="#2f627a" stroke-width="6"/>
                    <g fill="#223746" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif">
                        <text x="500" y="190" font-family="'Playwrite AU NSW', cursive" font-size="34">For: ${svgEscape(values.customerName || 'Customer')}</text>
                        <text x="500" y="236" font-size="30">${svgEscape(values.cakeTitle || 'Custom Cake')}</text>

                        <text x="500" y="322" font-family="'Playwrite AU NSW', cursive" font-size="34">Cake Details:</text>
                        <text x="500" y="368" font-size="29">${svgEscape(values.cakeDetails || 'Custom cake')}</text>
                        ${svgTextLines(flavorLines, 500, 410, 28, 36)}

                        <text x="500" y="526" font-size="34" font-weight="600">Quote Total: ${svgEscape(moneyDisplay(values.quoteTotal))}</text>
                        ${svgTextLines(includesLines, 500, 572, 27, 36)}

                        <text x="500" y="684" font-size="32" font-weight="600">Booking Deposit: ${svgEscape(moneyDisplay(values.deposit))}</text>
                        <text x="500" y="724" font-size="27">(non-refundable &amp; required to secure your order)</text>

                        <text x="500" y="808" font-family="'Playwrite AU NSW', cursive" font-size="34">Payment Options:</text>
                        <text x="500" y="852" font-size="27">Apple Cash: ${svgEscape(values.appleCash || PAYMENT_DEFAULTS.appleCash)}</text>
                        <text x="500" y="890" font-size="27">Venmo: ${svgEscape(values.venmo || PAYMENT_DEFAULTS.venmo)}</text>
                        <text x="500" y="928" font-size="27">Zelle: ${svgEscape(values.zelle || PAYMENT_DEFAULTS.zelle)}</text>
                        ${svgTextLines(paymentNoteLines, 500, 970, 26, 36)}

                        <text x="500" y="1082" font-size="28">Final Payment Due: Upon Pick-Up.</text>

                        <text x="500" y="1164" font-family="'Playwrite AU NSW', cursive" font-size="34">Pick-Up Date:</text>
                        <text x="500" y="1206" font-size="27">${svgEscape(values.pickupDate || 'TBD')}</text>
                        <text x="500" y="1270" font-family="'Playwrite AU NSW', cursive" font-size="20">Thank you, ${svgEscape(values.thankYouName || values.customerName || 'Customer')}!</text>
                    </g>
                    <circle cx="865" cy="1188" r="82" fill="#fffef9" stroke="#9fc9dc" stroke-width="5"/>
                    <image href="${logoDataUrl}" x="793" y="1116" width="144" height="144" preserveAspectRatio="xMidYMid meet"/>
                </svg>
            `;
        }

        async function renderQuoteCanvas() {
            if (document.fonts && document.fonts.ready) {
                await document.fonts.ready;
            }

            const svg = await buildQuoteSvg();
            const image = new Image();
            const imageUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
            image.src = imageUrl;
            await image.decode();

            const canvas = document.createElement('canvas');
            canvas.width = 1000;
            canvas.height = 1294;
            const context = canvas.getContext('2d');
            context.drawImage(image, 0, 0);
            return canvas;
        }

        function canvasToBlob(canvas, type, quality) {
            return new Promise(resolve => canvas.toBlob(resolve, type, quality));
        }

        function makePdfFromJpegDataUrl(dataUrl, imageWidth, imageHeight) {
            const base64 = dataUrl.split(',')[1];
            const jpegBinary = atob(base64);
            const jpegBytes = Uint8Array.from(jpegBinary, character => character.charCodeAt(0));
            const encoder = new TextEncoder();
            const pageWidth = 612;
            const pageHeight = Math.round(pageWidth * imageHeight / imageWidth);
            const content = `q\n${pageWidth} 0 0 ${pageHeight} 0 0 cm\n/Im0 Do\nQ\n`;
            const chunks = [encoder.encode('%PDF-1.4\n')];
            const offsets = [0];
            let length = chunks[0].length;

            function addChunk(chunk) {
                chunks.push(chunk);
                length += chunk.length;
            }

            function addObject(objectNumber, objectChunks) {
                offsets.push(length);
                addChunk(encoder.encode(`${objectNumber} 0 obj\n`));
                objectChunks.forEach(chunk => addChunk(typeof chunk === 'string' ? encoder.encode(chunk) : chunk));
                addChunk(encoder.encode('\nendobj\n'));
            }

            addObject(1, ['<< /Type /Catalog /Pages 2 0 R >>']);
            addObject(2, ['<< /Type /Pages /Kids [3 0 R] /Count 1 >>']);
            addObject(3, [`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>`]);
            addObject(4, [
                `<< /Type /XObject /Subtype /Image /Width ${imageWidth} /Height ${imageHeight} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`,
                jpegBytes,
                '\nendstream'
            ]);
            addObject(5, [`<< /Length ${content.length} >>\nstream\n${content}endstream`]);

            const xrefOffset = length;
            const objectCount = 5;
            const xrefRows = ['xref', `0 ${objectCount + 1}`, '0000000000 65535 f ']
                .concat(offsets.slice(1).map(offset => `${String(offset).padStart(10, '0')} 00000 n `))
                .join('\n');
            const trailer = `\n${xrefRows}\ntrailer\n<< /Size ${objectCount + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
            chunks.push(encoder.encode(trailer));

            return new Blob(chunks, { type: 'application/pdf' });
        }

        async function downloadQuotePng() {
            const values = getQuoteValues();
            const canvas = await renderQuoteCanvas();
            const blob = await canvasToBlob(canvas, 'image/png');
            downloadBlob(blob, `Slice-of-Heaven-Quote-${fileSafeName(values.customerName)}.png`);
        }

        async function downloadQuotePdf() {
            const values = getQuoteValues();
            const canvas = await renderQuoteCanvas();
            const pdfBlob = makePdfFromJpegDataUrl(canvas.toDataURL('image/jpeg', 0.95), canvas.width, canvas.height);
            downloadBlob(pdfBlob, `Slice-of-Heaven-Quote-${fileSafeName(values.customerName)}.pdf`);
        }

        authForm.addEventListener('submit', event => {
            event.preventDefault();
            adminKey = adminKeyInput.value.trim();
            loadRequests();
        });

        refreshBtn.addEventListener('click', loadRequests);

        forgetKeyBtn.addEventListener('click', () => {
            sessionStorage.removeItem(STORAGE_KEY);
            adminKey = '';
            adminKeyInput.value = '';
            dashboard.hidden = true;
            authPanel.hidden = false;
        });

        [searchInput, statusFilter, typeFilter].forEach(control => {
            const applyFilters = () => {
                const filtered = getFilteredRequests();
                setCalendarToNextRequest(filtered);
                render();
            };
            control.addEventListener('input', applyFilters);
            control.addEventListener('change', applyFilters);
        });

        document.querySelectorAll('.admin-view-toggle button').forEach(button => {
            button.addEventListener('click', () => {
                activeView = button.dataset.view;
                document.querySelectorAll('.admin-view-toggle button').forEach(item => item.classList.remove('active'));
                button.classList.add('active');
                render();
            });
        });

        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1);
            render();
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1);
            render();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            const today = new Date();
            calendarMonth = new Date(today.getFullYear(), today.getMonth(), 1);
            render();
        });

        listView.addEventListener('submit', async event => {
            event.preventDefault();
            const card = event.target.closest('.admin-request-card');
            const formData = new FormData(event.target);
            const button = event.target.querySelector('button');
            button.disabled = true;
            button.textContent = 'Saving...';

            try {
                const result = await apiRequest('updateStatus', {
                    rowNumber: card.dataset.row,
                    status: formData.get('status'),
                    quotedPrice: formData.get('quotedPrice'),
                    note: formData.get('note')
                });

                if (result.request) {
                    requests = requests.map(request => (
                        String(request.rowNumber) === String(result.request.rowNumber) ? result.request : request
                    ));
                    render();
                } else {
                    await loadRequests();
                }
            } catch (error) {
                alert(error.message);
            } finally {
                button.disabled = false;
                button.textContent = 'Save';
            }
        });

        listView.addEventListener('click', event => {
            const button = event.target.closest('.admin-quote-btn');
            if (!button) return;
            openQuoteModal(button.dataset.row);
        });

        calendarGrid.addEventListener('click', event => {
            const button = event.target.closest('button[data-row]');
            if (!button) return;

            activeView = 'list';
            document.querySelectorAll('.admin-view-toggle button').forEach(item => {
                item.classList.toggle('active', item.dataset.view === 'list');
            });
            render();
            document.querySelector(`[data-row="${button.dataset.row}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        quoteForm.addEventListener('input', event => {
            if (event.target.name === 'quoteTotal') {
                const total = parseMoneyValue(event.target.value);
                if (total) quoteForm.elements.deposit.value = Math.ceil(total / 2);
            }
            updateQuotePreview();
        });

        closeQuoteBtn.addEventListener('click', closeQuoteModal);

        quoteModal.addEventListener('click', event => {
            if (event.target === quoteModal) closeQuoteModal();
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && !quoteModal.hidden) closeQuoteModal();
        });

        downloadPdfBtn.addEventListener('click', async () => {
            downloadPdfBtn.disabled = true;
            downloadPdfBtn.textContent = 'Building...';

            try {
                await downloadQuotePdf();
            } catch (error) {
                alert(error.message || 'PDF could not be downloaded.');
            } finally {
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Download PDF';
            }
        });

        downloadPngBtn.addEventListener('click', async () => {
            downloadPngBtn.disabled = true;
            downloadPngBtn.textContent = 'Building...';

            try {
                await downloadQuotePng();
            } catch (error) {
                alert(error.message || 'PNG could not be downloaded.');
            } finally {
                downloadPngBtn.disabled = false;
                downloadPngBtn.textContent = 'Download PNG';
            }
        });

        saveQuoteBtn.addEventListener('click', async () => {
            if (!activeQuoteRequest) return;

            const values = Object.fromEntries(new FormData(quoteForm).entries());
            const currentStatus = normalizeStatus(activeQuoteRequest.status);
            const nextStatus = ['Booked', 'Completed', 'Backed Out'].includes(currentStatus) ? currentStatus : 'Quoted';
            saveQuoteBtn.disabled = true;
            saveQuoteBtn.textContent = 'Saving...';

            try {
                const result = await apiRequest('updateStatus', {
                    rowNumber: activeQuoteRequest.rowNumber,
                    status: nextStatus,
                    quotedPrice: moneyDisplay(values.quoteTotal),
                    note: activeQuoteRequest.statusNote || ''
                });

                if (result.request) {
                    requests = requests.map(request => (
                        String(request.rowNumber) === String(result.request.rowNumber) ? result.request : request
                    ));
                    activeQuoteRequest = result.request;
                    render();
                }
            } catch (error) {
                alert(error.message);
            } finally {
                saveQuoteBtn.disabled = false;
                saveQuoteBtn.textContent = 'Save Total';
            }
        });

        adminKey = getInitialKey();
        if (adminKey) {
            adminKeyInput.value = adminKey;
            loadRequests();
        }
    </script>
</body>
</html>
